# zero-touchd-standalone configuration (ds-free appliance).
# Simple `key = value`; '#' starts a comment. Restart the daemon to apply.

# Master switch — the daemon ignores all inbound SMS until true.
enabled = false

# Device-local gNMI server the daemon provisions (127.0.0.1 is pinned in code;
# only the port is taken from here). Must match your on-device gNMI server.
gnmi.host = 127.0.0.1
gnmi.port = 50051

# E.164 senders allowed to issue commands (CSV). Empty = any sender may attempt
# LOGIN (the password is still required). Non-allowlisted senders are dropped
# silently. Set this.
allowed.numbers =

# Login session lifetime + brute-force lockout.
session.ttl.sec  = 600
lockout.failures = 5
lockout.sec      = 900

# Cellular modem AT channel.
modem.dev  = /dev/ttyUSB2
modem.baud = 115200

# Local user store (id:sha256:access per line).
users.file = /etc/zerotouch/users
